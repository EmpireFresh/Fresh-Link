# ══════════════════════════════════════════════════════════════════════════
# FreshLink Empire Fresh — Netlify Configuration
# Site: https://empire-fresh.netlify.app
# ══════════════════════════════════════════════════════════════════════════

[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION  = "10"
  NEXT_TELEMETRY_DISABLED = "1"

# ── Next.js on Netlify requires @netlify/plugin-nextjs ────────────────────
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Headers de sécurité ──────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    X-XSS-Protection       = "1; mode=block"

# ── Cache des assets statiques ───────────────────────────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Redirects ────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/api/*"
  to     = "/api/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}
