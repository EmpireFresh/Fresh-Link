# netlify.toml
[build]
  publish   = "."                    # index.html est à la racine
  functions = "netlify/functions"    # dossier des fonctions serverless

[functions]
  node_bundler = "esbuild"           # bundler moderne, supporte ESM

# Redirige /api/submit → la fonction Netlify
[[redirects]]
  from   = "/api/submit"
  to     = "/.netlify/functions/submit"
  status = 200

# Headers de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache long pour les assets statiques
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
