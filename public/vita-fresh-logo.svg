<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a4f2a"/>
      <stop offset="100%" stop-color="#0d3318"/>
    </linearGradient>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Fond arrondi vert foncé -->
  <rect width="160" height="160" rx="28" fill="url(#bg)"/>

  <!-- Reflet subtil en haut -->
  <ellipse cx="80" cy="18" rx="55" ry="14" fill="rgba(255,255,255,0.06)"/>

  <!-- Lettre V stylisée -->
  <polygon
    points="28,38 52,38 80,98 108,38 132,38 80,122"
    fill="url(#vGrad)"
    filter="url(#shadow)"
  />

  <!-- Feuille au centre du V -->
  <ellipse cx="80" cy="72" rx="13" ry="20" fill="url(#leafGrad)" transform="rotate(-8,80,72)"/>
  <line x1="80" y1="55" x2="80" y2="90" stroke="#1a4f2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="80" y1="65" x2="86" y2="60" stroke="#1a4f2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="80" y1="72" x2="86" y2="67" stroke="#1a4f2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="80" y1="65" x2="74" y2="62" stroke="#1a4f2a" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Ligne dorée séparatrice -->
  <rect x="22" y="127" width="116" height="2.5" rx="1.2" fill="#b8962e"/>

  <!-- Texte VITA FRESH -->
  <text x="80" y="142" font-family="Arial Black,Arial,sans-serif" font-size="14.5" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">VITA FRESH</text>

  <!-- Sous-titre DISTRIBUTION -->
  <text x="80" y="155" font-family="Arial,sans-serif" font-size="7" font-weight="600" fill="#b8962e" text-anchor="middle" letter-spacing="2.5">DISTRIBUTION</text>
</svg>
